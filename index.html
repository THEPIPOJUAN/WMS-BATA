<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WMS Bata — Ingreso</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d1f3c 100%);
    position:relative;overflow:hidden;
  }
  body::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 20% 50%, rgba(220,38,38,0.15) 0%, transparent 60%),
               radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.1) 0%, transparent 50%);
  }
  .card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:48px 40px;
    width:380px;
    position:relative;z-index:1;
    box-shadow:0 25px 60px rgba(0,0,0,0.5);
  }
  .logo{
    text-align:center;margin-bottom:32px;
  }
  .logo .brand{
    font-size:13px;font-weight:600;letter-spacing:4px;
    color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:8px;
  }
  .logo h1{
    font-size:28px;font-weight:700;color:#fff;
    letter-spacing:-0.5px;
  }
  .logo h1 span{color:#dc2626;}
  .logo .sub{font-size:12px;color:rgba(255,255,255,0.3);margin-top:4px;}
  .field{margin-bottom:20px;}
  .field label{
    display:block;font-size:11px;font-weight:600;
    letter-spacing:2px;text-transform:uppercase;
    color:rgba(255,255,255,0.4);margin-bottom:8px;
  }
  .field input{
    width:100%;padding:14px 16px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:10px;color:#fff;font-size:15px;
    font-family:'Inter',sans-serif;
    transition:border-color .2s,background .2s;
    outline:none;
  }
  .field input:focus{
    border-color:rgba(220,38,38,0.6);
    background:rgba(255,255,255,0.09);
  }
  .field input::placeholder{color:rgba(255,255,255,0.2);}
  .btn{
    width:100%;padding:15px;margin-top:8px;
    background:linear-gradient(135deg,#dc2626,#991b1b);
    border:none;border-radius:10px;
    color:#fff;font-size:15px;font-weight:600;
    font-family:'Inter',sans-serif;cursor:pointer;
    transition:transform .15s,box-shadow .15s;
    letter-spacing:0.5px;
  }
  .btn:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(220,38,38,0.4);}
  .btn:active{transform:translateY(0);}
  .error{
    background:rgba(220,38,38,0.15);border:1px solid rgba(220,38,38,0.3);
    border-radius:8px;padding:12px 16px;margin-bottom:20px;
    color:#fca5a5;font-size:13px;text-align:center;
  }
  .divider{
    border:none;border-top:1px solid rgba(255,255,255,0.08);
    margin:28px 0 20px;
  }
  .footer{text-align:center;font-size:11px;color:rgba(255,255,255,0.2);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="brand">Almacén Central</div>
    <h1>WMS <span>BATA</span></h1>
    <div class="sub">Sistema de Gestión de Almacén</div>
  </div>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="field">
      <label>Usuario</label>
      <input type="text" name="usuario" placeholder="Ingresa tu usuario" autocomplete="off" required>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">Ingresar al Sistema</button>
  </form>
  <hr class="divider">
  <div class="footer">Solo lectura sin credenciales de edición</div>
</div>
</body>
</html>
